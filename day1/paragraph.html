<html>
  <head>
    <title>Paragraph</title>
  </head>
  <body>
    <h1 align="center"><u>HTML</u></h1>
    <hr />
    <p>
      <b>Lorem</b> <br />
      <i>this is italic</i> <br />
      <u>this is underline</u> <br />
      <big>this is big tag</big> <br />
      <small>this is small tag</small> <br />
      <del>this is delete tag</del> <br />
      a<sup>2</sup> + b <sup>2</sup> <br />
      H<sub>2</sub>o
    </p>
  </body>
</html>
