<!doctype html>
<html lang="en">
  <head>
    <title>grid</title>
    <style>
      .parent {
        height: 600px;
        width: 600px;
        padding: 20px;
        background-color: aqua;
        border:
          6px solid,
          black;
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(3, 1fr);
      }
      .parent > div {
        background-color: pink;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div><child1></child1></div>
      <div><child2></child2></div>
      <div><child3></child3></div>
      <div><child4></child4></div>
      <div><child5></child5></div>
      <div><child6></child6></div>
    </div>
  </body>
</html>
