<!doctype html>
<html lang="en">
  <head>
    <title>grid1</title>
    <style>
      .parent {
        background-color:aqua;
        height: 300px;
        width: 300px;
        border: 10px solid black;
        display: grid;
        gap: 20px;
        padding: 10px;
        grid-template-columns: 1fr 1fr;
      }
      .parent > div {
        background-color: pink;
        font-size: 100px;
        text-align: center;
      }
      .parent > .child1 {
        grid-row: span 2;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child1">1</div>
      <div class="child2">2</div>
      <div class="child3">3</div>
    </div>
  </body>
</html>
