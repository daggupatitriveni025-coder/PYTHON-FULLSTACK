<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <style>
      .parent {
        background-color: black;
        height: 600px;
        width: 600px;
        display: flex;
        flex-direction: row;

      }
      .parent > div {
        font-size: 100px;
        height: 150px;
        width: 150px;
      }
      .child1 {
        background-color: blue;
      }
      .child2 {
        background-color: blueviolet;
      }
      .child3 {
        background-color: white;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="parent child1">1</div>
      <div class="parent child2">2</div>
      <div class="parent child3">3</div>
    </div>
  </body>
</html>
