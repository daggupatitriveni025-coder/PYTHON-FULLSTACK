<html>
  <head>
    <title>selector</title>
    <style>
      h1 ~ p {
        color: red;
      }
      h1 + p {
        color: blue;
      }
      #p2,
      #p3 {
        color: green;
      }
    </style>
  </head>
  <body>
    <h1>this is triveni</h1>
    <p>this is para1</p>
    <p id="p2">this is para2</p>
    <p id="p3">this is para3</p>
    <p>this is para4</p>
  </body>
</html>
