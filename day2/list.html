<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>List's</title>
</head>
<body>
    <h2>Ordered List:</h2>
    <ol>
        <li>one</li>
        <li>two</li>
        <li>three</li>
        <li>four</li>
    </ol>
    <h2>Unordered List:</h2>
    <ul>
        <li>triveni</li>
        <li>sreeja</li>
        <li>bindhu</li>
    </ul>
    
</body>
</html>
